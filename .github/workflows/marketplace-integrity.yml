name: Marketplace Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: integrity-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub recommendation for early migration from Node 20 to Node 24 runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-registry:
    name: Registry Schema & Path Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        # F7: pin to SHA for supply-chain integrity (v6.0.2)
        uses: actions/checkout@v6.0.2

      - name: Setup Python 3.13
        # F7: pin to SHA for supply-chain integrity (v6.2.0)
        uses: actions/setup-python@v6.2.0

        with:
          python-version: "3.13"

      - name: Install jsonschema
        # F6: pin minor version range to prevent silent API breakage
        run: pip install jsonschema==4.26.0

      - name: Validate registry against schema
        run: |
          python3 - <<'PYEOF'
          import json
          import sys
          import jsonschema

          with open("registry.json") as f:
              registry = json.load(f)
          with open("docs/schemas/registry.schema.json") as f:
              schema = json.load(f)

          try:
              jsonschema.validate(instance=registry, schema=schema)
              print("registry.json is valid against registry.schema.json")
          except jsonschema.ValidationError as e:
              print(f"Validation failed: {e.message}")
              print(f"Path: {list(e.absolute_path)}")
              sys.exit(1)
          PYEOF

      - name: Check registry path validator syntax
        run: bash -n .github/scripts/validate-registry-paths.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint registry path validator script
        run: shellcheck .github/scripts/validate-registry-paths.sh

      - name: Validate registry paths exist
        run: bash .github/scripts/validate-registry-paths.sh

      - name: Detect unregistered assets (PR warning mode)
        if: github.event_name == 'pull_request'
        run: |
          bash .github/scripts/validate-registry-paths.sh --sync | tee sync-output.txt

      - name: Report Unregistered Assets as warnings
        if: github.event_name == 'pull_request'
        run: |
          if ! [ -f sync-output.txt ]; then
            echo "No sync output file found; skipping warnings."
            exit 0
          fi

          unregistered_count=$(grep '^SYNC_UNREGISTERED_COUNT|' sync-output.txt | tail -n1 | cut -d'|' -f2 || true)
          unregistered_count=${unregistered_count:-0}

          while IFS='|' read -r prefix path section suggested_id kind; do
            if [ "$prefix" = "UNREGISTERED" ]; then
              echo "::warning file=$path,title=Unregistered Assets::Path is not registered in registry.json (section=$section, suggested_id=$suggested_id, kind=$kind)"
            fi
          done < sync-output.txt

          {
            echo "### Unregistered Assets"
            echo ""
            echo "Count: **$unregistered_count**"
            echo ""
            echo "Use the Registry Schema Governor to transform sync output into ready-to-paste JSON snippets."
          } >> "$GITHUB_STEP_SUMMARY"
