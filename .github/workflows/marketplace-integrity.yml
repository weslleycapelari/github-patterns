name: Marketplace Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: integrity-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub recommendation for early migration from Node 20 to Node 24 runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-registry:
    name: Registry Schema & Path Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        # F7: pin to SHA for supply-chain integrity (v6.0.2)
        uses: actions/checkout@v6.0.2

      - name: Setup Python 3.13
        # F7: pin to SHA for supply-chain integrity (v6.2.0)
        uses: actions/setup-python@v6.2.0

        with:
          python-version: "3.13"

      - name: Install jsonschema
        # F6: pin minor version range to prevent silent API breakage
        run: pip install jsonschema==4.26.0

      - name: Validate registry against schema
        run: |
          python3 - <<'PYEOF'
          import json
          import sys
          import jsonschema

          with open("registry.json") as f:
              registry = json.load(f)
          with open("docs/schemas/registry.schema.json") as f:
              schema = json.load(f)

          try:
              jsonschema.validate(instance=registry, schema=schema)
              print("registry.json is valid against registry.schema.json")
          except jsonschema.ValidationError as e:
              print(f"Validation failed: {e.message}")
              print(f"Path: {list(e.absolute_path)}")
              sys.exit(1)
          PYEOF

      - name: Check registry path validator syntax
        run: bash -n .github/scripts/validate-registry-paths.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint registry path validator script
        run: shellcheck .github/scripts/validate-registry-paths.sh

      - name: Validate registry paths exist
        run: bash .github/scripts/validate-registry-paths.sh
