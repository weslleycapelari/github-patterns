name: Marketplace Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: integrity-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub recommendation for early migration from Node 20 to Node 24 runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-registry:
    name: Registry Schema & Path Integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        # F7: pin to SHA for supply-chain integrity (v6.0.2)
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python 3.13
        # F7: pin to SHA for supply-chain integrity (v6.2.0)
        uses: actions/setup-python@v6.2.0

        with:
          python-version: "3.13"

      - name: Install jsonschema
        # F6: pin minor version range to prevent silent API breakage
        run: pip install jsonschema==4.26.0

      - name: Validate registry against schema
        run: |
          python3 - <<'PYEOF'
          import json
          import sys
          import jsonschema

          with open("registry.json") as f:
              registry = json.load(f)
          with open("docs/schemas/registry.schema.json") as f:
              schema = json.load(f)

          try:
              jsonschema.validate(instance=registry, schema=schema)
              print("registry.json is valid against registry.schema.json")
          except jsonschema.ValidationError as e:
              print(f"Validation failed: {e.message}")
              print(f"Path: {list(e.absolute_path)}")
              sys.exit(1)
          PYEOF

      - name: Check registry path validator syntax
        run: bash -n .github/scripts/validate-registry-paths.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint registry path validator script
        run: shellcheck .github/scripts/validate-registry-paths.sh

      - name: Check mission protocol validator syntax
        run: bash -n .github/scripts/validate-mission-protocol.sh

      - name: Lint mission protocol validator script
        run: shellcheck .github/scripts/validate-mission-protocol.sh

      - name: Validate mission protocol gate (PR)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/validate-mission-protocol.sh

      - name: Validate registry paths exist
        run: bash .github/scripts/validate-registry-paths.sh

      - name: Detect unregistered assets (PR warning mode)
        if: github.event_name == 'pull_request'
        run: |
          bash .github/scripts/validate-registry-paths.sh --sync | tee sync-output.txt

      - name: Report Unregistered Assets as warnings
        if: github.event_name == 'pull_request'
        run: |
          if ! [ -f sync-output.txt ]; then
            echo "No sync output file found; skipping warnings."
            exit 0
          fi

          unregistered_count=$(grep '^SYNC_UNREGISTERED_COUNT|' sync-output.txt | tail -n1 | cut -d'|' -f2 || true)
          unregistered_count=${unregistered_count:-0}

          while IFS='|' read -r prefix path section suggested_id kind; do
            if [ "$prefix" = "UNREGISTERED" ]; then
              echo "::warning file=$path,title=Unregistered Assets::Path is not registered in registry.json (section=$section, suggested_id=$suggested_id, kind=$kind)"
            fi
          done < sync-output.txt

          {
            echo "### Unregistered Assets"
            echo ""
            echo "Count: **$unregistered_count**"
            echo ""
            echo "Use the Registry Schema Governor to transform sync output into ready-to-paste JSON snippets."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Governance Audit — Eval Coverage Report (PR)
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import sys

          EVALS_DIR = "library/evals"
          REGISTRY_FILE = "registry.json"
          SEVERITY_HIGH = "HIGH"
          SEVERITY_MEDIUM = "MEDIUM"
          SEVERITY_PASS = "PASS"

          with open(REGISTRY_FILE, encoding="utf-8") as f:
              registry = json.load(f)

          registered_agents = list(registry.get("assets", {}).get("agents", {}).keys())

          results = []
          high_count = 0

          for agent_id in sorted(registered_agents):
              agent_dir = os.path.join(EVALS_DIR, agent_id)
              if not os.path.isdir(agent_dir):
                  results.append((agent_id, 0, SEVERITY_HIGH, "No eval directory found"))
                  high_count += 1
                  continue

              cases = [
                  f for f in os.listdir(agent_dir)
                  if os.path.isfile(os.path.join(agent_dir, f))
                  and f.startswith("case-")
                  and f != ".gitkeep"
                  and not f.startswith("README")
              ]
              count = len(cases)

              has_bad_input = any("bad-input" in f for f in cases)
              has_hq_output = any("expected-high-quality" in f or "high-quality" in f for f in cases)

              if count == 0:
                  severity = SEVERITY_HIGH
                  note = "No eval cases"
                  high_count += 1
              elif not has_bad_input or not has_hq_output:
                  severity = SEVERITY_MEDIUM
                  note = f"{count} case(s) — missing {'bad-input' if not has_bad_input else 'expected-high-quality-output'}"
              else:
                  severity = SEVERITY_PASS
                  note = f"{count} case(s) — covered"

              results.append((agent_id, count, severity, note))

          summary_lines = [
              "### Governance Audit — Eval Coverage",
              "",
              f"| Agent | Cases | Severity | Note |",
              f"|-------|-------|----------|------|",
          ]
          for agent_id, count, severity, note in results:
              icon = "🔴" if severity == SEVERITY_HIGH else ("🟡" if severity == SEVERITY_MEDIUM else "✅")
              summary_lines.append(f"| `{agent_id}` | {count} | {icon} {severity} | {note} |")

          summary_lines += [
              "",
              f"**Total agents:** {len(registered_agents)} | **High gaps:** {high_count}",
              "",
          ]

          if high_count > 0:
              summary_lines.append(f"> ⛔ **{high_count} agent(s) have no eval coverage. Add eval cases to `library/evals/<agent-id>/` to resolve.**")

          summary_text = "\n".join(summary_lines)
          print(summary_text)

          github_step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if github_step_summary:
              with open(github_step_summary, "a", encoding="utf-8") as f:
                  f.write("\n" + summary_text + "\n")

          if high_count > 0:
              print(f"\nAUDIT|FAIL|eval-coverage|high_gaps={high_count}", file=sys.stderr)
              sys.exit(1)

          print("AUDIT|PASS|eval-coverage|all-agents-covered")
          PYEOF
