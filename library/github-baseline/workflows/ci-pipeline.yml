name: Quality Gate (CI)

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Super Linter
        uses: github/super-linter@v5
        env:
          # Validate changed files by default for faster PR feedback.
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_MARKDOWN: true

      - name: Setup Node.js (if Node project)
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Run Node.js tests
        if: hashFiles('package.json') != ''
        run: |
          npm ci
          npm test --if-present

      - name: Setup Python (if Python project)
        if: hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run Python tests
        if: hashFiles('pyproject.toml') != '' || hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest
          pytest -q

      - name: No test framework detected
        if: hashFiles('package.json') == '' && hashFiles('pyproject.toml') == '' && hashFiles('requirements.txt') == ''
        run: echo "No Node.js or Python test configuration found. Add your stack-specific tests in this workflow."
