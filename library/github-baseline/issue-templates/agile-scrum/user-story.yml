name: Scrum User Story
description: Describe user value with acceptance criteria and implementation context.
title: "[STORY] "
labels: ["story", "needs-estimation"]
assignees: []
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      value: |
        As a <role>
        I want <capability>
        So that <business value>
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and Constraints
      description: Include dependencies, assumptions, and technical constraints.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Given ... when ... then ...
        - [ ] Given ... when ... then ...
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Tests cover the new behavior
        - [ ] Documentation updated
        - [ ] Non-functional requirements validated
    validations:
      required: true
  - type: input
    id: parent_epic
    attributes:
      label: Parent Epic
      placeholder: "Epic #456"
    validations:
      required: false
