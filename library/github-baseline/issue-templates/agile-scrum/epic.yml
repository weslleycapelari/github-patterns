name: Scrum Epic
description: Define a multi-sprint initiative with business outcomes and scope.
title: "[EPIC] "
labels: ["epic", "needs-refinement"]
assignees: []
body:
  - type: textarea
    id: objective
    attributes:
      label: Business Objective
      description: What measurable outcome should this epic deliver?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope (In and Out)
      value: |
        In Scope:
        -

        Out of Scope:
        -
    validations:
      required: true
  - type: textarea
    id: success_metrics
    attributes:
      label: Success Metrics
      placeholder: "Metric, baseline, target"
    validations:
      required: true
  - type: textarea
    id: child_stories
    attributes:
      label: Planned Stories
      description: List expected child stories/tasks with rough order.
      value: |
        - [ ] Story A
        - [ ] Story B
    validations:
      required: false
  - type: input
    id: target_sprints
    attributes:
      label: Target Sprint Window
      placeholder: "Sprint 21-24"
    validations:
      required: false
