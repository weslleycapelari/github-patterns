name: Scrum Technical Task
description: Define technical work needed to deliver stories or hardening goals.
title: "[TASK] "
labels: ["task", "needs-estimation"]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be implemented and why?
    validations:
      required: true
  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Implementation completed
        - [ ] Tests added or updated
        - [ ] Documentation updated if needed
        - [ ] Peer review completed
    validations:
      required: true
  - type: input
    id: parent_story
    attributes:
      label: Parent Story
      placeholder: "Story #123"
    validations:
      required: false
