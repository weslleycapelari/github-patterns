name: Business Initiative
description: Define a cross-team initiative with measurable business outcomes.
title: "[INITIATIVE] "
labels: ["initiative", "portfolio", "needs-sizing"]
assignees: []
body:
  - type: input
    id: sponsor
    attributes:
      label: Sponsor or Product Owner
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Business Hypothesis
      description: Expected business outcome and why it is credible.
    validations:
      required: true
  - type: textarea
    id: success_metrics
    attributes:
      label: Success Metrics
      placeholder: "Metric, baseline, target, review date"
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Cross-Team Dependencies
    validations:
      required: true
  - type: input
    id: target_pi
    attributes:
      label: Target Program Increment
      placeholder: "PI-2026-Q3"
    validations:
      required: false
