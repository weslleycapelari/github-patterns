name: 🏛️ Business Initiative / Epic
description: High-level business requirement for PI Planning and Portfolio tracking.
title: "[INITIATIVE] "
labels: ["initiative", "needs-t-shirt-sizing"]
body:
  - type: input
    id: sponsor
    attributes:
      label: Executive Sponsor / Product Owner
      placeholder: "e.g., Jane Doe (VP of Payments)"
    validations:
      required: true
  - type: textarea
    id: business_hypothesis
    attributes:
      label: Business Hypothesis
      description: What is the measurable business value? (Lean Business Case)
    validations:
      required: true
  - type: textarea
    id: cross_team_dependencies
    attributes:
      label: Cross-Team Dependencies
      description: Which other squads/tribes need to be involved?
    validations:
      required: true
  - type: input
    id: target_pi
    attributes:
      label: Target Program Increment (PI)
      placeholder: "e.g., PI-2026-Q3"
    validations:
      required: false
