name: Security Finding Remediation
description: Track remediation work for vulnerabilities and security findings.
title: "[SEC] "
labels: ["security", "needs-urgent-triage"]
assignees: []
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity (CVSS-aligned)
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: input
    id: source_reference
    attributes:
      label: Source (CVE or Scanner Reference)
      placeholder: "CVE-YYYY-NNNNN or report URL"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Finding Details
      description: Explain exploit path and affected components.
    validations:
      required: true
  - type: textarea
    id: remediation_plan
    attributes:
      label: Remediation Plan
      value: |
        - [ ] Short-term mitigation applied
        - [ ] Permanent fix implemented
        - [ ] Verification test added
    validations:
      required: true
  - type: input
    id: sla_due_date
    attributes:
      label: SLA Due Date
      placeholder: "YYYY-MM-DD"
    validations:
      required: true
