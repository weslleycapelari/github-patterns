name: 🔒 Security Finding Remediation
description: Track remediation for SAST/DAST, Pen-tests, or CVEs.
title: "[SEC] "
labels: ["security", "high-priority"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: CVSS Severity
      options:
        - Critical (SLA: 24h)
        - High (SLA: 7 days)
        - Medium (SLA: 30 days)
        - Low (SLA: 90 days)
    validations:
      required: true
  - type: input
    id: cve_or_scan_link
    attributes:
      label: CVE ID or Scan Report Link
      placeholder: "e.g., CVE-2026-12345 or link to SonarQube/CodeQL finding"
    validations:
      required: true
  - type: textarea
    id: finding_details
    attributes:
      label: Vulnerability Details
      description: Describe the vulnerability and the exploit vector.
    validations:
      required: true
  - type: textarea
    id: remediation_guidance
    attributes:
      label: Remediation Guidance
      description: How should the developer fix this?
    validations:
      required: true
