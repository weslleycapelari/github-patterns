name: Compliance Audit Request
description: Request compliance evidence, risk review, or regulatory action tracking.
title: "[AUDIT] "
labels: ["compliance", "audit", "needs-governance"]
assignees: []
body:
  - type: dropdown
    id: audit_type
    attributes:
      label: Audit Type
      options:
        - SOC 2 Evidence
        - ISO 27001 Evidence
        - LGPD/GDPR Data Subject Request
        - Internal Architecture Review
        - License Compliance
    validations:
      required: true
  - type: textarea
    id: request_details
    attributes:
      label: Requested Evidence or Action
    validations:
      required: true
  - type: input
    id: due_date
    attributes:
      label: Regulatory Due Date
      placeholder: "YYYY-MM-DD"
    validations:
      required: true
  - type: textarea
    id: systems_scope
    attributes:
      label: Systems and Data Scope
      description: Services, data classes, and owners impacted.
    validations:
      required: true
  - type: input
    id: related_policy
    attributes:
      label: Related Policy or Control ID
      placeholder: "e.g., SOC2-CC6.1"
    validations:
      required: false
