name: Enterprise User Story
description: Story with traceability, acceptance criteria, and compliance context.
title: "[STORY] "
labels: ["story", "enterprise", "needs-estimation"]
assignees: []
body:
  - type: input
    id: parent_initiative
    attributes:
      label: Parent Initiative
      placeholder: "#123 or portfolio reference"
    validations:
      required: true
  - type: textarea
    id: story
    attributes:
      label: User Story
      value: |
        As a <role>
        I want <capability>
        So that <business value>
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Given ... when ... then ...
        - [ ] Given ... when ... then ...
    validations:
      required: true
  - type: checkboxes
    id: compliance_flags
    attributes:
      label: Compliance and Data Impact
      options:
        - label: This work touches personal data (PII).
          required: false
        - label: This work affects payment or financial data.
          required: false
        - label: This work introduces or changes a public API.
          required: false
  - type: input
    id: related_controls
    attributes:
      label: Related Control IDs
      placeholder: "SOC2-CC6.1, ISO-A.12.1"
    validations:
      required: false
