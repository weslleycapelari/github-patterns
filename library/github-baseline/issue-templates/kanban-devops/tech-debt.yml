name: Technical Debt
description: Track maintenance and refactoring work with explicit risk.
title: "[TECH-DEBT] "
labels: ["tech-debt", "maintenance"]
assignees: []
body:
  - type: textarea
    id: current_state
    attributes:
      label: Current State and Pain
      description: What is difficult, slow, fragile, or expensive today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Refactoring or Fix
    validations:
      required: true
  - type: dropdown
    id: risk_of_inaction
    attributes:
      label: Risk of Inaction
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Refactor implemented
        - [ ] Performance/reliability validated
        - [ ] Tests updated
    validations:
      required: true
