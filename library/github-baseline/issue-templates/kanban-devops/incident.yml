name: Production Incident
description: Capture incident impact, timeline, and prevention actions.
title: "[INCIDENT] "
labels: ["incident", "production", "high-priority"]
assignees: []
body:
  - type: input
    id: detected_at
    attributes:
      label: Detection Time (UTC)
      placeholder: "YYYY-MM-DD HH:MM"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Incident Severity
      options:
        - SEV-1
        - SEV-2
        - SEV-3
        - SEV-4
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User and Business Impact
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline
      placeholder: |
        HH:MM - Detection
        HH:MM - Mitigation started
        HH:MM - Service restored
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Root Cause and Immediate Mitigation
    validations:
      required: true
  - type: textarea
    id: prevention_actions
    attributes:
      label: Prevention Actions
      value: |
        - [ ] Monitoring gap closed
        - [ ] Test coverage added
        - [ ] Runbook updated
    validations:
      required: true
