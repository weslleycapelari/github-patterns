name: 🔥 Production Incident / Post-Mortem
description: Report system degradation, outages, or post-mortem action items.
title: "[INCIDENT] "
labels: ["incident", "production"]
body:
  - type: input
    id: date_time
    attributes:
      label: Date and Time of Incident
      placeholder: "YYYY-MM-DD HH:MM UTC"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Business/User Impact
      description: Who was affected and how severely?
    validations:
      required: true
  - type: textarea
    id: root_cause
    attributes:
      label: Root Cause & Mitigation
      description: Why did it happen and how was it stabilized?
    validations:
      required: true
  - type: textarea
    id: action_items
    attributes:
      label: Preventive Action Items
      description: What tasks (code, infra, alerts) need to be done to prevent recurrence?
      value: |
        - [ ] Add monitoring alert for...
        - [ ] Add automated test for...
        - [ ] Fix configuration in...
    validations:
      required: true
