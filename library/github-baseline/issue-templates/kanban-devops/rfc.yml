name: 🏗️ Request for Comments (RFC)
description: Propose an architectural change, new tool, or infrastructure design.
title: "[RFC] "
labels: ["rfc", "architecture"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context and Motivation
      description: Why do we need to make this architectural change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Architecture / Tool
      description: Detail your proposed solution. Include links to docs if necessary.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other options were evaluated and why were they rejected?
    validations:
      required: true
  - type: checkboxes
    id: reviews
    attributes:
      label: Required Reviews
      options:
        - label: Security Team Review
        - label: Infrastructure/DevOps Review
        - label: Staff/Principal Engineer Review
