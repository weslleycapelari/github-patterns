name: Architecture RFC
description: Propose architectural or infrastructure changes with clear trade-offs.
title: "[RFC] "
labels: ["rfc", "architecture", "needs-review"]
assignees: []
body:
  - type: textarea
    id: context
    attributes:
      label: Context and Problem
      description: Why is this RFC needed now?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Approach
      description: Include architecture outline and implementation boundaries.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and Mitigations
    validations:
      required: true
  - type: checkboxes
    id: reviews
    attributes:
      label: Required Reviews
      options:
        - label: Security review completed
          required: false
        - label: Platform/DevOps review completed
          required: false
        - label: Principal engineer review completed
          required: false
