name: Kanban Feature
description: Track a deliverable feature for continuous flow teams.
title: "[FEAT] "
labels: ["enhancement", "kanban", "needs-triage"]
assignees: []
body:
  - type: textarea
    id: value
    attributes:
      label: Value Proposition
      description: What value will this deliver for users or operations?
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements and Acceptance Criteria
      value: |
        - [ ] Requirement 1
        - [ ] Requirement 2
    validations:
      required: true
  - type: dropdown
    id: rollout_strategy
    attributes:
      label: Rollout Strategy
      options:
        - Feature Flag
        - Canary
        - Full Deployment
    validations:
      required: true
  - type: textarea
    id: observability
    attributes:
      label: Observability and Monitoring Plan
      description: Metrics, dashboards, and alerts required at launch.
    validations:
      required: false
  - type: input
    id: related_issues
    attributes:
      label: Related Issues
      placeholder: "Depends on #123"
    validations:
      required: false
