name: 🚀 Continuous Feature
description: Propose a new feature or enhancement for continuous delivery.
title: "[FEAT] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: value_proposition
    attributes:
      label: Value Proposition
      description: What problem does this solve for the user or the business?
    validations:
      required: true
  - type: textarea
    id: requirements
    attributes:
      label: Requirements & Acceptance Criteria
      description: What are the exact conditions for this to be deployed?
      value: |
        - [ ]
  - type: dropdown
    id: rollout_strategy
    attributes:
      label: Rollout Strategy
      description: How should this be deployed to production?
      options:
        - Feature Flag (Dark Launch)
        - Canary Release (Gradual)
        - Standard Deployment (All at once)
    validations:
      required: true
