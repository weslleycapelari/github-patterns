name: Shape Up Pitch
description: Propose a shaped concept for a betting cycle.
title: "[PITCH] "
labels: ["pitch", "needs-betting"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What opportunity or pain are we addressing?
    validations:
      required: true
  - type: dropdown
    id: appetite
    attributes:
      label: Appetite
      options:
        - 1-2 weeks
        - 6 weeks
    validations:
      required: true
  - type: textarea
    id: solution_sketch
    attributes:
      label: Solution Sketch
      description: Fat-marker level concept of the solution.
    validations:
      required: true
  - type: textarea
    id: rabbit_holes
    attributes:
      label: Rabbit Holes
      description: Known complexity risks and likely traps.
    validations:
      required: true
  - type: textarea
    id: no_gos
    attributes:
      label: No-Gos
      description: Explicitly out-of-scope ideas and boundaries.
    validations:
      required: true
