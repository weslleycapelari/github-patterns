name: Shape Up Cooldown Task
description: Capture bug fixes, tooling, and maintenance for cooldown cycles.
title: "[COOLDOWN] "
labels: ["cooldown", "maintenance"]
assignees: []
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Bug Fix
        - Technical Debt
        - Tooling or DX Improvement
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What should be improved and why now?
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Change implemented
        - [ ] Verification completed
        - [ ] Documentation updated if required
    validations:
      required: true
