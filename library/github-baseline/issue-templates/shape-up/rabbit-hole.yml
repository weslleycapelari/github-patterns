name: Shape Up Rabbit Hole
description: Record unexpected complexity and propose scope hammering decisions.
title: "[RABBIT-HOLE] "
labels: ["rabbit-hole", "scope-change"]
assignees: []
body:
  - type: input
    id: related_scope
    attributes:
      label: Related Scope Issue
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: discovery
    attributes:
      label: Discovery
      description: What complexity was uncovered?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact on Appetite
      description: Why current scope cannot be completed inside appetite.
    validations:
      required: true
  - type: textarea
    id: proposed_cut
    attributes:
      label: Proposed Scope Cut
      description: What should be cut or simplified to ship on time?
    validations:
      required: true
