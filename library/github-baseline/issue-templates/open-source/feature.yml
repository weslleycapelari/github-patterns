name: 💡 Feature Request
description: Suggest an idea or enhancement for this project.
title: "[FEAT] "
labels: ["enhancement", "triage-needed"]
body:
  - type: markdown
    attributes:
      value: |
        We love community ideas! Please articulate the *problem* you are facing clearly.
  - type: checkboxes
    id: search_check
    attributes:
      label: Duplicate Check
      options:
        - label: I have searched for similar feature requests and found none.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when [...] because [...]"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or new capability you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: checkboxes
    id: willingness_to_contribute
    attributes:
      label: Willingness to Contribute
      options:
        - label: I am willing to submit a Pull Request to implement this feature.
          required: false
