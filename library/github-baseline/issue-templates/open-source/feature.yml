name: Open Source Feature Request
description: Propose a feature with problem statement and community value.
title: "[FEAT] "
labels: ["enhancement", "triage-needed"]
assignees: []
body:
  - type: checkboxes
    id: duplicate_check
    attributes:
      label: Duplicate Check
      options:
        - label: I searched for similar feature requests before submitting.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user pain point should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe expected behavior and scope.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
    validations:
      required: false
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: checkboxes
    id: willingness_to_contribute
    attributes:
      label: Contribution Intent
      options:
        - label: I can submit a pull request for this feature.
          required: false
