name: Open Source Bug Report
description: Report a reproducible bug for community triage.
title: "[BUG] "
labels: ["bug", "triage-needed"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing.
        Please search existing issues before submitting a new one.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checks
      options:
        - label: I searched for duplicates and did not find the same issue.
          required: true
        - label: I tested with the latest released version.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      description: A concise description of the bug and impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Provide a minimal reproducible example.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs Actual Behavior
      placeholder: |
        Expected:
        Actual:
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, runtime version, package version"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and Screenshots
      render: shell
    validations:
      required: false
  - type: input
    id: related_issues
    attributes:
      label: Related Issues
      placeholder: "Related to #123"
    validations:
      required: false
