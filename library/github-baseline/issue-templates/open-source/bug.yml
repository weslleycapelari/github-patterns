name: 🐛 Bug Report
description: Create a report to help us improve the project.
title: "[BUG] "
labels: ["bug", "triage-needed"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please make sure you have searched the [existing issues](../issues) before proceeding.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checks
      options:
        - label: I have searched existing issues and found no duplicates.
          required: true
        - label: I am using the latest version of the project.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, reproducible example (CodeSandbox, Git repo, or exact steps).
      placeholder: |
        1. Run command '...'
        2. Click on '...'
        3. See error '...'
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Details
      description: OS, Node.js/Python version, Browser version, etc.
      placeholder: "e.g., macOS 14.1, Node.js v20.11.0, Chrome 120"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant terminal logs or screenshots here.
      render: shell
    validations:
      required: false
